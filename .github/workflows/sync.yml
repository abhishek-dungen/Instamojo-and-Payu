name: Sync Data
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
jobs:
  sync:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: python3 -m pip install openpyxl
      - run: npm ci
      - run: node scripts/sync-all.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add public/data data-sources
          git commit -m "sync payments data"
          git push
