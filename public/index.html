<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instamojo Payments Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Instamojo</p>
        <h1>Payments dashboard</h1>
        <p class="lede">99 = webinar, 198 = bundle, >500 = course.</p>
        <p class="lede muted" id="refreshState">Loading</p>
      </div>
      <div class="hero-actions">
        <button id="reload">Reload data</button>
        <button class="ghost" id="serverRefresh">Sync from Instamojo</button>
      </div>
    </header>

    <section class="kpis" id="kpis"></section>

    <section class="panel controls">
      <input id="q" placeholder="Search name, email, amount, ID, purpose" />
      <select id="status"><option value="">All statuses</option></select>
      <select id="category"><option value="">All categories</option></select>
      <select id="bucket"><option value="">All buckets</option><option value="99">99</option><option value="198">198</option><option value="500+">500+</option><option value="Other">Other</option></select>
      <input id="from" type="date" />
      <input id="to" type="date" />
    </section>

    <section class="grid">
      <article class="panel chart-card">
        <div class="panel-head"><h2>Revenue by category</h2><span>₹ split</span></div>
        <div id="categoryChart" class="chart"></div>
      </article>
      <article class="panel chart-card">
        <div class="panel-head"><h2>Transactions by status</h2><span>count</span></div>
        <div id="statusChart" class="chart"></div>
      </article>
    </section>

    <section class="panel toolbar">
      <div id="summaryLine" class="muted"></div>
      <div class="toolbar-actions">
        <button class="ghost" id="exportAll">Export all CSV</button>
      </div>
    </section>

    <section class="panel table-panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th></th><th>Date</th><th>Customer</th><th>Amount</th><th>Type</th><th>Status</th><th>Phone</th><th>Email</th><th>Transaction</th>
            </tr>
          </thead>
          <tbody id="table"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
