<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instamojo Payments Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow" id="providerLabel">Combined</p>
        <h1>Payments dashboard</h1>
        <p class="lede muted" id="refreshState">Loading</p>
      </div>
      <div class="hero-right">
        <div class="sync-pill">
          <span>Last sync</span>
          <strong id="lastSync">--</strong>
        </div>
        <div class="hero-actions">
          <button id="reload">Reload data</button>
          <button class="ghost" id="serverRefresh">Sync all</button>
        </div>
      </div>
    </header>

    <section class="panel webinar-panel">
      <div class="panel-head"><h2>Webinar analysis</h2><span>single webinar</span></div>
      <select id="webinar"><option value="">All webinars</option></select>
      <div id="webinarKpis" class="stat-grid"></div>
    </section>

    <section class="panel webinar-panel">
      <div class="panel-head"><h2>Historical live totals</h2><span>all webinars</span></div>
      <div id="historyKpis" class="stat-grid"></div>
    </section>

    <section class="panel toolbar">
      <div class="toolbar-actions">
        <button class="ghost" id="exportAll">Export all CSV</button>
      </div>
    </section>

    <section class="panel filters-panel">
      <input id="q" class="search-box" placeholder="Quick search: name, phone, email, source, category, amount, date, day, time" />
      <div id="filterWidgets" class="filter-grid"></div>
      <div class="filter-actions">
        <button class="ghost" id="clearFilters">Clear all</button>
      </div>
    </section>

    <section class="panel table-panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Transaction</th><th>Name</th><th>Phone</th><th>Email</th><th>Source</th><th>Category</th><th>Amount</th><th>Date</th><th>Day</th><th>Time</th>
            </tr>
          </thead>
          <tbody id="table"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
